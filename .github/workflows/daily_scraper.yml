name: Daily Market News Scraper

on:
  schedule:
    # Runs everyday at 12:00 UTC (7:00 AM EST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to trigger it manually via the GitHub website

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper Script
      env:
        # Injects GitHub Secrets safely into environment variables
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        RESEND_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        TO_EMAIL: ${{ secrets.TO_EMAIL }}
      run: python scraper.py
